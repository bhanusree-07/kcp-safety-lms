<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Modules - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">
<link rel="stylesheet" href="../css/admin.css">

</head>

<body style="display:none;">

<div class="employee-layout">


<!-- MAIN -->

<div class="employee-main">

<!-- BANNER -->

<div class="employee-banner">

<h1 id="banner-title">
Loading...
</h1>

<p>
View the modules for this course.
</p>

</div>


<!-- MODULES -->
<div class="modules-layout">

<div id="module-list-panel">

<h3 class="course-content-title">
Course Content
</h3>

<div id="module-list">
</div>

</div>

<div id="module-content-panel">

<h2>
Select a module
</h2>

<p>
Choose a module from the left side.
</p>

</div>

</div>

</div>

</div>


<script>

let completedModuleIds = [];

let courseProgress = 0;

const params=
new URLSearchParams(
window.location.search
);

const courseId=
params.get("course_id");



console.log(courseId);

async function loadCourseInfo(){

const response=
await fetch(
`http://localhost:3000/course-name?course_id=${courseId}`
);

const course=
await response.json();

document.getElementById(
"banner-title"
).innerHTML=
course.title + " Modules";



}


async function loadProgress(){

const email =
localStorage.getItem("userEmail");

const response =
await fetch(
`http://localhost:3000/user-progress?email=${email}`
);

const data =
await response.json();

const course =
data.find(
item => item.course_id == courseId
);

if(course){

courseProgress =
course.progress_percent;

console.log("Progress from DB:", courseProgress);

}

}


async function loadCompletedModules(){

const email =
localStorage.getItem("userEmail");

const response =
await fetch(
`http://localhost:3000/module-progress?email=${email}&course_id=${courseId}`
);

const data =
await response.json();

completedModuleIds =
data.map(
item => item.module_id
);

}



async function loadModules(){

const response=
await fetch(
`http://localhost:3000/course-modules?course_id=${courseId}`
);

const modules=
await response.json();

console.log(modules);

const container=
document.getElementById(
"module-list"
);

const contentPanel=
document.getElementById(
"module-content-panel"
);

container.innerHTML="";



if(modules.length===0){

container.innerHTML=`

<div class="admin-section-card">

<p>
No modules created yet.
</p>

</div>

`;

return;

}


modules.forEach(module=>{

const isCompleted =
completedModuleIds.includes(
module.id
);

container.innerHTML+=`

<div
class="module-item
${isCompleted ? "completed-module" : ""}
"
onclick="showModule(${module.id})"
>

${isCompleted ? "✓ " : ""}

${module.module_order}.
${module.module_title}

</div>

`;

});



container.innerHTML+=`

<div class="sidebar-divider"></div>

<div
class="module-item special-item"
onclick="showQuiz()"
>
Quiz
</div>

<div
class="module-item special-item"
onclick="showCertificate()"
>
Certificate
</div>

<div class="sidebar-divider"></div>

<div class="progress-placeholder">

Progress

<br>

${courseProgress}%

</div>

`;

if(modules.length > 0){

showModule(modules[0].id);

}

}
function showModule(moduleId){

fetch(
`http://localhost:3000/course-modules?course_id=${courseId}`
)
.then(res=>res.json())
.then(modules=>{

const module=
modules.find(
m=>m.id==moduleId
);

console.log(module);

document.getElementById(
"module-content-panel"
).innerHTML=`

<div class="module-view">

<h2>
${module.module_title}
</h2>

${
module.module_content
?
`
<p class="module-description">
${module.module_content}
</p>
`
:
""
}

${
module.video_link
?
`
<hr class="module-divider">

<div class="video-section">

<h3>
Video Lesson
</h3>

<iframe
width="100%"
height="500"
src="${
module.video_link.replace(
"watch?v=",
"embed/"
)
}"
frameborder="0"
allowfullscreen
style="
border:none;
border-radius:12px;
margin-top:15px;
"
>
</iframe>

</div>

<br>
`
:
""
}

${
module.pdf_file
?
`
<hr class="module-divider">

<div class="pdf-section">

<h3>
Learning Material
</h3>

<div class="pdf-viewer-card">

<iframe
src="../assests/module-pdfs/${module.pdf_file}"
width="100%"
height="1000"
style="
border:none;
border-radius:12px;
margin-top:15px;
"
>
</iframe>

<a
href="../assests/module-pdfs/${module.pdf_file}"
download
class="admin-save-btn"
style="
display:inline-block;
margin-top:15px;
text-decoration:none;
"
>
Download PDF
</a>

</div>

</div>
`
:
""
}

<div class="module-complete-section">

<button
id="complete-btn"
onclick="completeModule(${module.id})"
>
✓ Mark Module Complete
</button>

</div>


</div>

</div>

`;

});

}

function showResources(){

fetch(
`http://localhost:3000/course-modules?course_id=${courseId}`
)
.then(res=>res.json())
.then(modules=>{

let html=`

<h2>
Resources
</h2>

`;

modules.forEach(module=>{

if(module.video_link){

let embedUrl=
module.video_link.replace(
"watch?v=",
"embed/"
);

html+=`

<div class="admin-section-card">

<h3>
${module.module_title}
</h3>

<iframe
width="100%"
height="400"
src="${embedUrl}"
title="YouTube Video"
frameborder="0"
allowfullscreen
style="
border:none;
border-radius:12px;
margin-top:15px;
"
>
</iframe>

</div>

`;

}

});

document.getElementById(
"module-content-panel"
).innerHTML=
html;

});

}


function showQuiz(){

window.location.href =
`quiz.html?course_id=${courseId}`;

}


function showCertificate(){

document.getElementById(
"module-content-panel"
).innerHTML=`

<div class="admin-section-card">

<h2>
Certificate
</h2>

<p>
Complete the quiz to unlock your certificate.
</p>

</div>

`;

}


async function completeModule(moduleId){

const email =
localStorage.getItem("userEmail");

const response =
await fetch(
`http://localhost:3000/get-user?email=${email}`
);

const user =
await response.json();

await fetch(
"http://localhost:3000/complete-module",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user.id,
course_id:courseId,
module_id:moduleId
})
}
);

const modulesResponse =
await fetch(
`http://localhost:3000/course-modules?course_id=${courseId}`
);

const allModules =
await modulesResponse.json();

const progressResponse =
await fetch(
`http://localhost:3000/module-progress?email=${email}&course_id=${courseId}`
);

const completedModules =
await progressResponse.json();

const progressPercent =
Math.round(
(
completedModules.length
/
(allModules.length + 1)
)
* 100
);



alert(
`Module completed. Progress: ${progressPercent}%`
);

await loadProgress();

await loadCompletedModules();

await loadModules();

showModule(moduleId);

}




async function init(){

await loadCourseInfo();

await loadProgress();

await loadCompletedModules();

await loadModules();

}

init();

</script>



<script src="../js/employee-auth.js"></script>
<script src="../js/logout.js"></script>

</body>
</html>
