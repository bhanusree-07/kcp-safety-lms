<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Progress - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">
<link rel="stylesheet" href="../css/admin.css">

</head>

<body>

<div class="employee-layout">

<!-- SIDEBAR -->

<div class="employee-sidebar">

<div class="sidebar-logo">

<a href="../index.html">

<img
src="../assests/kcp_logo3.png"
alt="KCP Logo"
class="sidebar-logo-img">

</a>

<h3>

<a
href="../index.html"
class="sidebar-title-link"
>

Safety LMS

</a>

</h3>

</div>


<div class="sidebar-menu">

<a href="courses.html">
⌂ Dashboard
</a>

<a href="course-details.html">
▣ All Courses
</a>

<a
href="progress.html"
class="active-sidebar"
>
◔ Progress
</a>

<a href="certificates.html">
✦ Certificates
</a>

<a href="profile.html">
◌ Profile
</a>

<a
href="#"
onclick="openLogoutModal()"
>
↩ Logout
</a>

</div>

</div>


<!-- MAIN -->

<div class="employee-main">

<!-- BANNER -->

<div class="employee-banner">

<h1>

Learning Progress

</h1>

<p>

Track your completed and ongoing courses.

</p>

</div>


<!-- PROGRESS GRID -->

<div class="course-filters">

<div class="filter-box">

<select id="courseFilter">

<option value="">
Courses
</option>

</select>

</div>

<div class="filter-box">

<select id="statusFilter">

<option value="">
Status
</option>

<option value="Completed">
Completed
</option>

<option value="In Progress">
In Progress
</option>

<option value="Not Started">
Not Started
</option>

</select>

</div>

<button id="clearFilters">

Clear

</button>

</div>

<div class="admin-section-card">

<h2>
My Progress
</h2>

<table class="admin-progress-table">

<thead>

<tr>

<th>
Course
</th>

<th>
Progress
</th>

<th>
Status
</th>

<th>
Action
</th>

</tr>

</thead>

<tbody id="progress-body">

</tbody>

</table>

</div>
</div>

</div>


<script>

let progressData = [];
let filteredData = [];

const grid=
document.getElementById(
"progress-grid"
);

const email=
localStorage.getItem(
"userEmail"
);


/* LOAD USER PROGRESS */
/* Fetches progress dashboard */

async function loadProgress(){

const response=
await fetch(
`http://localhost:3000/user-progress?email=${email}`
);

progressData=
await response.json();

filteredData =
progressData;

populateFilters();

renderProgress();

}

function populateFilters(){

const courseFilter =
document.getElementById(
"courseFilter"
);

courseFilter.innerHTML = `
<option value="">
Courses
</option>
`;

const courses = [

...new Set(

progressData.map(
item=>item.course_title
)

)

];

courses.forEach(
course=>{

courseFilter.innerHTML += `
<option value="${course}">
${course}
</option>
`;

}
);

}

/* RENDER PROGRESS */

function renderProgress(){

const tbody =
document.getElementById(
"progress-body"
);

tbody.innerHTML="";

filteredData.forEach(
item=>{
let actionText =
"Start";

if(
item.progress_percent > 0
&&
item.progress_percent < 100
){
actionText =
"Continue";
}

if(
item.progress_percent === 100
){
actionText =
"View";
}

tbody.innerHTML += `

<tr>

<td
title="${item.course_title}"
>
${
item.course_title
.split(" ")
.length > 5

?

item.course_title
.split(" ")
.slice(0,4)
.join(" ")

+ "..."

:

item.course_title
}
</td>

<td>
${item.progress_percent}%
</td>

<td>

<span class="progress-badge ${

item.progress_percent === 100
?
"completed"
:
item.progress_percent > 0
?
"in-progress"
:
"not-started"

}">

${item.status}

</span>

</td>

<td>

<a href="module.html?course_id=${item.course_id}">

${actionText}

</a>

</td>

</tr>

`;

}
);

}




function filterProgress(){

const selectedCourse =
document.getElementById(
"courseFilter"
).value;

const selectedStatus =
document.getElementById(
"statusFilter"
).value;

filteredData =

progressData.filter(
item=>{

const courseMatch =

!selectedCourse ||

item.course_title ===
selectedCourse;

const statusMatch =

!selectedStatus ||

item.status ===
selectedStatus;

return(
courseMatch &&
statusMatch
);

}
);

renderProgress();

}



function clearFilters(){

document.getElementById(
"courseFilter"
).value="";

document.getElementById(
"statusFilter"
).value="";

filteredData =
progressData;

renderProgress();

}

document.getElementById(
"courseFilter"
).addEventListener(
"change",
filterProgress
);

document.getElementById(
"statusFilter"
).addEventListener(
"change",
filterProgress
);

document.getElementById(
"clearFilters"
).addEventListener(
"click",
clearFilters
);


/* INITIAL LOAD */

loadProgress();

</script>

<!-- LOGOUT MODAL -->

<div
id="logout-modal"
class="logout-modal"
>

<div class="logout-box">

<h3>
Logout
</h3>

<p>
Do you want to logout?
</p>

<div class="logout-actions">

<button
class="logout-cancel"
onclick="closeLogoutModal()"
>
Cancel
</button>

<button
class="logout-confirm"
onclick="logoutUser()"
>
Yes
</button>

</div>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>
<script src="../js/employee-auth.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
