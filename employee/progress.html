<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Progress - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">

</head>

<body>

<div class="employee-layout">

<!-- SIDEBAR -->

<div class="employee-sidebar">

<div class="sidebar-logo">

<a href="../index.html">

<img
src="../assests/kcp_logo3.png"
alt="KCP Logo"
class="sidebar-logo-img">

</a>

<h3>

<a
href="../index.html"
class="sidebar-title-link"
>

Safety LMS

</a>

</h3>

</div>


<div class="sidebar-menu">

<a href="courses.html">
⌂ Dashboard
</a>

<a href="course-details.html">
▣ My Courses
</a>

<a
href="progress.html"
class="active-sidebar"
>
◔ Progress
</a>

<a href="certificates.html">
✦ Certificates
</a>

<a href="profile.html">
◌ Profile
</a>

<a
href="#"
onclick="openLogoutModal()"
>
↩ Logout
</a>

</div>

</div>


<!-- MAIN -->

<div class="employee-main">

<!-- BANNER -->

<div class="employee-banner">

<h1>

Learning Progress

</h1>

<p>

Track your completed and ongoing courses.

</p>

</div>


<!-- PROGRESS GRID -->

<div
class="employee-course-grid"
id="progress-grid"
>

</div>

</div>

</div>


<script>

let progressData=[];

const grid=
document.getElementById(
"progress-grid"
);

const email=
localStorage.getItem(
"userEmail"
);


/* LOAD USER PROGRESS */
/* Fetches progress dashboard */

async function loadProgress(){

const response=
await fetch(
`http://localhost:3000/user-progress?email=${email}`
);

progressData=
await response.json();

renderProgress();

}


/* RENDER PROGRESS */

function renderProgress(){

grid.innerHTML="";

progressData.forEach(
item=>{

let buttonClass=
"progress-btn";

if(
item.status==="Completed"
){

buttonClass=
"completed-btn";

}

grid.innerHTML+=`

<div class="employee-course-card">

<h3>

Course ID:
${item.course_id}

</h3>

<p>

${item.status}

</p>

<p>

${item.progress_percent}%

</p>

<a
href="#"
class="${buttonClass}"
>

${item.status}

</a>

</div>

`;

}

);

}


/* INITIAL LOAD */

loadProgress();

</script>

<!-- LOGOUT MODAL -->

<div
id="logout-modal"
class="logout-modal"
>

<div class="logout-box">

<h3>
Logout
</h3>

<p>
Do you want to logout?
</p>

<div class="logout-actions">

<button
class="logout-cancel"
onclick="closeLogoutModal()"
>
Cancel
</button>

<button
class="logout-confirm"
onclick="logoutUser()"
>
Yes
</button>

</div>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>
<script src="../js/employee-auth.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
