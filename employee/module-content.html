<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Module Content - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">

</head>

<body>

<div class="employee-layout">

<div class="employee-sidebar">

<div class="sidebar-logo">

<a href="courses.html">

<img
src="../assests/kcp_logo3.png"
alt="KCP Logo"
class="sidebar-logo-img">

</a>

<h3>

<a
href="courses.html"
class="sidebar-title-link"
>

Safety LMS

</a>

</h3>

</div>


<div class="sidebar-menu">

<a href="courses.html">
⌂ Dashboard
</a>

<a
href="course-details.html"
class="active-sidebar"
>
▣ All Courses
</a>

<a href="progress.html">
◔ Progress
</a>

<a href="certificates.html">
✦ Certificates
</a>

<a href="profile.html">
◌ Profile
</a>

<a
href="#"
onclick="openLogoutModal()"
>
↩ Logout
</a>

</div>

</div>


<div class="employee-main">

<!-- HEADER -->

<div class="employee-banner">

<h1 id="module-title">
Loading...
</h1>

<p>
Learning Module
</p>

</div>


<!-- CONTENT -->

<div class="module-overview-card">

<div id="module-content">

Loading content...

</div>

</div>


<!-- COMPLETE -->

<div class="quiz-preview-card">

<button id="complete-btn">

Complete Module

</button>

</div>

</div>

</div>


<script>

/* URL */

const params=
new URLSearchParams(
window.location.search
);

const moduleId=
params.get(
"module_id"
);

const courseId=
params.get(
"course_id"
);

const email=
localStorage.getItem(
"userEmail"
);


/* ELEMENTS */

const title=
document.getElementById(
"module-title"
);

const content=
document.getElementById(
"module-content"
);

const completeBtn=
document.getElementById(
"complete-btn"
);


/* LOAD MODULE */

async function loadModule(){

try{

const response=
await fetch(
`http://localhost:3000/module-details?module_id=${moduleId}`
);

const module=
await response.json();

title.innerHTML=
module.module_title;

content.innerHTML=
module.module_content;

}

catch(error){

title.innerHTML=
"Error";

content.innerHTML=
"Could not load module";

}

}


/* COMPLETE */

completeBtn.addEventListener(
"click",
async()=>{

try{

const userResponse=
await fetch(
`http://localhost:3000/get-user?email=${email}`
);

const user=
await userResponse.json();


await fetch(
"http://localhost:3000/update-progress",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({

user_id:user.id,
course_id:courseId,
progress_percent:100,
status:"completed"

})
}
);


completeBtn.innerHTML=
"Completed";

completeBtn.disabled=
true;


/* SMALL DELAY */

setTimeout(
()=>{

window.location.href=
`module.html?course_id=${courseId}`;

},
700
);

}

catch(error){

console.log(
error
);

}

}
);


/* LOAD */

loadModule();

</script>

<!-- LOGOUT MODAL -->

<div
id="logout-modal"
class="logout-modal"
>

<div class="logout-box">

<h3>
Logout
</h3>

<p>
Do you want to logout?
</p>

<div class="logout-actions">

<button
class="logout-cancel"
onclick="closeLogoutModal()"
>
Cancel
</button>

<button
class="logout-confirm"
onclick="logoutUser()"
>
Yes
</button>

</div>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>
<script src="../js/employee-auth.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
