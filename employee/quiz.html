<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Quiz - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">

</head>

<body>

<div class="employee-layout">

<!-- SIDEBAR -->


<!-- MODULES --
<div class="modules-layout">

<div id="module-list-panel">

<h3 class="course-content-title">
Course Content
</h3>

<div id="module-list">
</div>

</div>

<div id="module-content-panel">

<h2>
Select a module
</h2>

<p>
Choose a module from the left side.
</p>

</div>

</div>----->


<!-- MAIN -->

<div class="employee-main">

<div class="employee-banner">

<h1>
Course Quiz
</h1>

<p>
Complete the quiz to unlock certification.
</p>

</div>


<div class="quiz-preview-card">

<div id="quiz-container">

Loading quiz...

</div>

</div>

</div>

</div>


<script>

let questions = [];

let currentQuestion = 0;

let answers = {};


const params =
new URLSearchParams(
window.location.search
);

const courseId =
params.get(
"course_id"
);


async function loadModules(){

const response=
await fetch(
`http://localhost:3000/course-modules?course_id=${courseId}`
);

const modules=
await response.json();

console.log(modules);

const container=
document.getElementById(
"module-list"
);

const contentPanel=
document.getElementById(
"module-content-panel"
);

container.innerHTML="";



if(modules.length===0){

container.innerHTML=`

<div class="admin-section-card">

<p>
No modules created yet.
</p>

</div>

`;

return;

}

modules.forEach(module=>{

container.innerHTML+=`

<div
class="module-item"
onclick="showModule(${module.id})"
>

${module.module_order}.
${module.module_title}

</div>

`;


});

container.innerHTML+=`

<div class="sidebar-divider"></div>

<div
class="module-item special-item"
onclick="showQuiz()"
>
Quiz
</div>

<div
class="module-item special-item"
onclick="showCertificate()"
>
Certificate
</div>

<div class="sidebar-divider"></div>

<div class="progress-placeholder">

Progress

<br>

${courseProgress}%

</div>

`;

if(modules.length > 0){

showModule(modules[0].id);

}

}




async function loadQuiz(){

const response =
await fetch(
`http://localhost:3000/quiz-questions?quiz_id=${courseId}`
);

questions =
await response.json();

renderQuestion();

}

function renderQuestion(){

const question =
questions[currentQuestion];

document.getElementById(
"quiz-container"
).innerHTML = `

<div class="question-badge">

Question ${currentQuestion + 1}
of
${questions.length}

</div>

<div class="quiz-card">

<h3 class="quiz-question">
${question.question}
</h3>

<label class="quiz-option">

<input
type="radio"
name="answer"
value="A"
${answers[currentQuestion] === "A" ? "checked" : ""}
>

A. ${question.option_a}

</label>

<label class="quiz-option">

<input
type="radio"
name="answer"
value="B"
${answers[currentQuestion] === "B" ? "checked" : ""}
>

B. ${question.option_b}

</label>

<label class="quiz-option">

<input
type="radio"
name="answer"
value="C"
${answers[currentQuestion] === "C" ? "checked" : ""}
>

C. ${question.option_c}

</label>

<label class="quiz-option">

<input
type="radio"
name="answer"
value="D"
${answers[currentQuestion] === "D" ? "checked" : ""}
>

D. ${question.option_d}

</label>

<div class="quiz-actions">

<button
class="admin-save-btn"
onclick="previousQuestion()"
>

← Previous

</button>

<button
class="admin-add-btn"
onclick="nextQuestion()"
>

${currentQuestion === questions.length-1
? "Submit Quiz"
: "Next →"}

</button>

</div>

</div>

`;

}

function nextQuestion(){

const selected =
document.querySelector(
'input[name="answer"]:checked'
);

if(selected){

answers[currentQuestion] =
selected.value;

}

if(
currentQuestion <
questions.length - 1
){

currentQuestion++;

renderQuestion();

}
else{

submitQuiz();

}

}

function previousQuestion(){

if(currentQuestion > 0){

currentQuestion--;

renderQuestion();

}

}

async function submitQuiz(){

let score = 0;

questions.forEach(
(question,index)=>{

if(
answers[index] ===
question.correct_answer
){

score += Number(question.marks);

}

}
);

const totalMarks =
questions.reduce(
(sum,q)=>
sum + Number(q.marks),
0
);

const percentage =
Math.round(
(score / totalMarks) * 100
);

alert(
`Quiz Finished!\n\nScore: ${score}/${totalMarks}\n\nPercentage: ${percentage}%`
);

if(percentage >= 60){

const email =
localStorage.getItem(
"userEmail"
);

const userResponse =
await fetch(
`http://localhost:3000/get-user?email=${email}`
);

const user =
await userResponse.json();

await fetch(
"http://localhost:3000/create-certificate",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user.id,
course_id:courseId
})
}
);

alert(
"Congratulations! You passed the quiz."
);

window.location.href =
"certificates.html";

}
else{

alert(
"You did not reach the passing score. Please try again."
);

}

}
loadQuiz();

</script>

<!-- LOGOUT MODAL -->

<div
id="logout-modal"
class="logout-modal"
>

<div class="logout-box">

<h3>
Logout
</h3>

<p>
Do you want to logout?
</p>

<div class="logout-actions">

<button
class="logout-cancel"
onclick="closeLogoutModal()"
>
Cancel
</button>

<button
class="logout-confirm"
onclick="logoutUser()"
>
Yes
</button>

</div>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>
<script src="../js/employee-auth.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
