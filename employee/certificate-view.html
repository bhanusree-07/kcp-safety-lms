<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/component.css">

</head>

<body>

<div class="certificate-container">

<img
src="../assests/certificate-template.png"
class="certificate-template"
alt="Certificate"
>

<h2 id="employee-name">
Loading...
</h2>

<h3 id="course-name">
Loading...
</h3>

<p id="certificate-date">
Loading...
</p>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const certificateId =
params.get(
"certificate_id"
);

async function loadCertificate(){

const response =
await fetch(
`https://kcp-safety-lms.onrender.com/certificate-details?certificate_id=${certificateId}`
);

const cert =
await response.json();

console.log(cert);

document.getElementById(
"employee-name"
).innerText =
cert.full_name;

document.getElementById(
"course-name"
).innerText =
cert.title;

document.getElementById(
"certificate-date"
).innerText =
new Date(
cert.issued_at
).toLocaleDateString();

}

loadCertificate();

</script>

</body>

</html>
