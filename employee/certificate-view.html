<script>

const params =
new URLSearchParams(
window.location.search
);

const certificateId =
params.get(
"certificate_id"
);

async function loadCertificate(){

const response =
await fetch(
`https://kcp-safety-lms.onrender.com/certificate-details?certificate_id=${certificateId}`
);

const cert =
await response.json();

console.log(cert);

document.getElementById(
"employee-name"
).innerText =
cert.full_name;

document.getElementById(
"course-name"
).innerText =
cert.title;

document.getElementById(
"certificate-date"
).innerText =
new Date(
cert.issued_at
).toLocaleDateString();

}

loadCertificate();

</script>
