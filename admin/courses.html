</head>

>

<div class="sidebar-menu">

<a href="dashboard.html">

</a>

href="#"
onclick="openLogoutModal()"
>

</a>

</div>

</div>


<!-- MAIN -->

<div class="employee-main">

<!-- PAGE BANNER -->

<div class="employee-banner">

<h1>
Manage Courses
</h1>

<p>
Create, edit and manage LMS training courses.
</p>

</div>


<!-- TOOLBAR -->

<div class="admin-toolbar">

<input
type="text"
placeholder="Search courses..."
id="course-search"
>

<a
href="course-editor.html"
class="admin-add-btn"
>
+ Create Course
</a>

</div>

<div class="course-filters">

<select id="status-filter">

<option value="all">
All Status
</option>

<option value="published">
Published
</option>

<option value="draft">
Draft
</option>

</select>

<select id="language-filter">

<option value="all">
All Languages
</option>

<option value="English">
English
</option>

<option value="Telugu">
Telugu
</option>

</select>

</div>

<div
class="admin-course-grid"
id="course-grid"
>

</div>


</div>

</div>

<div id="delete-popup" class="delete-popup">

<div class="delete-popup-box">

<h3>
Delete Course?
</h3>

<p>
Permanently delete the course & its modules?
</p>

<div class="delete-popup-actions">

<button
id="cancel-delete-btn"
class="admin-save-btn"
>
Cancel
</button>

<button
id="confirm-delete-btn"
class="admin-delete-btn"
>
Delete
</button>

</div>

</div>

</div>

<script>

let allCourses = [];

function renderCourses(courses){

const grid=
document.getElementById(
"course-grid"
);

grid.innerHTML="";

courses.forEach(
(course)=>{

grid.innerHTML+=`

<div class="admin-course-card">

<img
src="https://kcp-safety-lms.onrender.com/course-thumbnails/${course.thumbnail}"
class="admin-course-thumbnail"
>

<h3 title="${course.title}">
${
course.title.split(" ").length > 5
?
course.title.split(" ").slice(0,3).join(" ") + "..."
:
course.title
}
</h3>

<p>
Language:
${course.language}
</p>

<p>
Duration:
${course.duration}
</p>

<p>
Status:
${course.status}
</p>

<div class="admin-course-actions">

<a href="course-editor.html?course_id=${course.id}">
✎ Edit
</a>

<a href="manage-modules.html?course_id=${course.id}">
◫ Modules
</a>

<a
href="#"
class="delete-btn"
data-id="${course.id}"
>
Delete
</a>

</div>

</div>

`;

}
);

}

function filterCourses(){

const search=
document
.getElementById(
"course-search"
)
.value
.toLowerCase();

const status=
document
.getElementById(
"status-filter"
)
.value;

const language=
document
.getElementById(
"language-filter"
)
.value;

const filtered=
allCourses.filter(course=>{

const matchesSearch=
course.title
.toLowerCase()
.includes(search);

const matchesStatus=
status==="all"
||
course.status===status;

const matchesLanguage=
language==="all"
||
course.language===language;

return(
matchesSearch
&&
matchesStatus
&&
matchesLanguage
);

});

renderCourses(filtered);

}

async function loadCourses(){

const response=
await fetch(
"https://kcp-safety-lms.onrender.com/courses"
);

const courses=
await response.json();

allCourses = courses;

renderCourses(courses);

}

loadCourses();

document
.getElementById(
"course-search"
)
.addEventListener(
"input",
filterCourses
);

document
.getElementById(
"status-filter"
)
.addEventListener(
"change",
filterCourses
);

document
.getElementById(
"language-filter"
)
.addEventListener(
"change",
filterCourses
);

document.addEventListener(
"click",
function(e){

if(
e.target.classList.contains(
"delete-btn"
)
){

e.preventDefault();

const courseId=
e.target.dataset.id;

window.courseToDelete=
courseId;

document
.getElementById(
"delete-popup"
)
.classList.add(
"show"
);
document.body.style.overflow="hidden";

}

}
);

document
.getElementById(
"cancel-delete-btn"
)
.addEventListener(
"click",
function(){

document
.getElementById(
"delete-popup"
)
.classList.remove(
"show"
);
document.body.style.overflow="auto";

}
);

</script>
<script>
document
.getElementById(
"confirm-delete-btn"
)
.addEventListener(
"click",
async function(){

const courseId=
window.courseToDelete;

const response=
await fetch(
`https://kcp-safety-lms.onrender.com/delete-course?course_id=${courseId}`,
{
method:"DELETE"
}
);

const data=
await response.json();

if(data.success){

document
.getElementById(
"delete-popup"
)
.classList.remove(
"show"
);

document.body.style.overflow="auto";

loadCourses();

}

}
);
</script>

function logoutUser(){

localStorage.clear();

"../index.html";

}

</script>
