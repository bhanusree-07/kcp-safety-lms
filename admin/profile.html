class="sidebar-title-link"

</div>

<div class="employee-main">

<div class="employee-banner">

<h1>
Admin Profile
</h1>

<p>
Manage administrator account information.
</p>

</div>

<div class="profile-card">

<div class="profile-form">

<div class="profile-group">

<label>Full Name</label>

<input
type="text"
id="full-name"
>

</div>

<div class="profile-group">

<label>Email</label>

<input
type="email"
id="email"
>

</div>

<div class="profile-group">

<label>Department</label>

<input
type="text"
id="department"
>

</div>

<div class="profile-group">

<label>Designation</label>

<input
type="text"
id="designation"
>

</div>

<div class="profile-group profile-full">

<label>Role</label>

<input
type="text"
id="role"
readonly
>

</div>

</div>

<button
id="save-profile"
class="profile-save-btn"
>
Save Changes
</button>

<p id="profile-message"></p>

</div>

</div>

</div>

</div>

<script>

const email =
localStorage.getItem(
"userEmail"
);

async function loadProfile(){

const response =
await fetch(
`https://kcp-safety-lms.onrender.com/get-user?email=${email}`
);

const user =
await response.json();

if(!user){

document.getElementById(
"profile-message"
).innerHTML =
"User not found";

return;

}

document.getElementById(
"full-name"
).value =
user.full_name;

document.getElementById(
"email"
).value =
user.email;

document.getElementById(
"department"
).value =
user.department;

document.getElementById(
"designation"
).value =
user.designation;

document.getElementById(
"role"
).value =
user.role;

}

loadProfile();

document.getElementById(
"save-profile"
).addEventListener(
"click",
async()=>{

const full_name=
document.getElementById(
"full-name"
).value;

const newEmail=
document.getElementById(
"email"
).value;

const department=
document.getElementById(
"department"
).value;

const designation=
document.getElementById(
"designation"
).value;

const response=
await fetch(
"https://kcp-safety-lms.onrender.com/update-user",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
full_name,
email:newEmail,
department,
designation,
old_email:email
})
}
);

const data=
await response.json();

document.getElementById(
"profile-message"
).innerHTML=
data.message;

localStorage.setItem(
"userEmail",
newEmail
);

}

);

</script>


<!-- LOGOUT MODAL -->

<div
id="logout-modal"
class="logout-modal"
>

<div class="logout-box">

<h3>
Logout
</h3>

<p>
Do you want to logout?
</p>

<div class="logout-actions">

<button
class="logout-cancel"
onclick="closeLogoutModal()"
>
Cancel
</button>

<button
class="logout-confirm"
onclick="logoutUser()"
>
Yes
</button>

</div>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>

<script src="../js/theme.js"></script>
<script src="../js/auth-check.js"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/logout.js"></script>
