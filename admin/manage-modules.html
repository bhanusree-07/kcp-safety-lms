<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Modules - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">
<link rel="stylesheet" href="../css/admin.css">

</head>

<body style="display:none;">

<div class="employee-layout">


<!-- MAIN -->

<div class="employee-main">

<!-- BANNER -->

<div class="employee-banner">

<h1 id="banner-title">
Loading...
</h1>

<p>
View the modules for this course.
</p>

</div>


<!-- MODULES -->
<div class="modules-layout">

<div id="module-list-panel">

<h3 class="course-content-title">
Course Content
</h3>

<div id="module-list">
</div>

</div>

<div id="module-content-panel">

<h2>
Select a module
</h2>

<p>
Choose a module from the left side.
</p>

</div>

</div>

</div>

</div>

<div
id="delete-module-popup"
class="delete-popup"
>

<div class="delete-popup-box">

<h3>
Delete Module?
</h3>

<p>
Permanently delete this module?
</p>

<div class="delete-popup-actions">

<button
id="cancel-module-delete"
class="admin-save-btn"
>
Cancel
</button>

<button
id="confirm-module-delete"
class="admin-delete-btn"
>
Delete
</button>

</div>

</div>

</div>


<script>

const params=
new URLSearchParams(
window.location.search
);

const courseId=
params.get("course_id");

console.log(courseId);

async function loadCourseInfo(){

const response=
await fetch(
`http://localhost:3000/course-name?course_id=${courseId}`
);

const course=
await response.json();

document.getElementById(
"banner-title"
).innerHTML=
course.title + " Modules";



}

async function loadModules(){

const response=
await fetch(
`http://localhost:3000/course-modules?course_id=${courseId}`
);

const modules=
await response.json();

console.log(modules);

const container=
document.getElementById(
"module-list"
);

const contentPanel=
document.getElementById(
"module-content-panel"
);

container.innerHTML="";

contentPanel.innerHTML=`

<h2>
Select a module
</h2>

<p>
Choose a module from the left side.
</p>

`;

if(modules.length===0){

container.innerHTML=`

<div class="admin-section-card">

<p>
No modules created yet.
</p>

</div>

`;

return;

}

modules.forEach(module=>{

container.innerHTML+=`

<div
class="module-item"
onclick="showModule(${module.id})"
>

${module.module_order}.
${module.module_title}

</div>

`;

function showResources(){

document.getElementById(
"module-content-panel"
).innerHTML=`

<h2>
Resources
</h2>

<p>
Module PDFs, images and videos will appear here.
</p>

`;

}

function showQuiz(){

document.getElementById(
"module-content-panel"
).innerHTML=`

<h2>
Quiz
</h2>

<p>
Quiz preview will appear here.
</p>

`;

}

function showCertificate(){

document.getElementById(
"module-content-panel"
).innerHTML=`

<h2>
Certificate
</h2>

<p>
Certificate preview will appear here.
</p>

`;

}

});

container.innerHTML+=`

<div class="sidebar-divider"></div>

<div
class="module-item special-item"
onclick="showResources()"
>
Resources
</div>

<div
class="module-item special-item"
onclick="showQuiz()"
>
Quiz
</div>

<div
class="module-item special-item"
onclick="showCertificate()"
>
Certificate
</div>

`;

}
function showModule(moduleId){

fetch(
`http://localhost:3000/course-modules?course_id=${courseId}`
)
.then(res=>res.json())
.then(modules=>{

const module=
modules.find(
m=>m.id==moduleId
);

console.log(module);

document.getElementById(
"module-content-panel"
).innerHTML=`

<div class="module-view">

<h2>
${module.module_title}
</h2>

<p class="module-description">
${module.module_content || "No description"}
</p>

<div class="module-resource-section">

<h3>
Learning Materials
</h3>

${
module.pdf_file
?
`
<div class="pdf-viewer-card">

<iframe
src="../assests/module-pdfs/${module.pdf_file}"
width="100%"
height="700"
style="
border:none;
border-radius:12px;
margin-top:15px;
"
>
</iframe>

<a
href="../assests/module-pdfs/${module.pdf_file}"
download
class="admin-save-btn"
style="
display:inline-block;
margin-top:15px;
text-decoration:none;
"
>
Download PDF
</a>

</div>
`
:
`
<p>
No files uploaded yet.
</p>
`
}




</div>

</div>

`;

});

}

loadCourseInfo();
loadModules();

document.addEventListener(
"click",
function(e){

if(
e.target.classList.contains(
"delete-module-btn"
)
){

const moduleId=
e.target.dataset.id;

window.moduleToDelete=
moduleId;

document
.getElementById(
"delete-module-popup"
)
.classList.add(
"show"
);

document.body.style.overflow=
"hidden";

}

}
);


document
.getElementById(
"cancel-module-delete"
)
.addEventListener(
"click",
function(){

document
.getElementById(
"delete-module-popup"
)
.classList.remove(
"show"
);

document.body.style.overflow=
"auto";

}
);


document
.getElementById(
"confirm-module-delete"
)
.addEventListener(
"click",
async function(){

const moduleId=
window.moduleToDelete;

const response=
await fetch(
`http://localhost:3000/delete-module?module_id=${moduleId}`,
{
method:"DELETE"
}
);

const data=
await response.json();

if(data.success){

document
.getElementById(
"delete-module-popup"
)
.classList.remove(
"show"
);

document.body.style.overflow=
"auto";

loadModules();

}

}
);
</script>



<script src="../js/auth-check.js"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/logout.js"></script>

</body>
</html>
