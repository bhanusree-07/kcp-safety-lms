<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Progress - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">
<link rel="stylesheet" href="../css/admin.css">

</head>

<body style="display:none;">

<div class="employee-layout">

<!-- ADMIN SIDEBAR -->

<div class="employee-sidebar">

<div class="sidebar-logo">

<a href="../index.html">

<img
src="../assests/kcp_logo3.png"
alt="KCP Logo"
class="sidebar-logo-img">

</a>

<h3>

<a
href="../index.html"
class="sidebar-title-link"
>

Safety LMS

</a>

</h3>

</div>


<!-- NAVIGATION -->

<div class="sidebar-menu">

<a href="dashboard.html">
⌂ Dashboard
</a>

<a href="courses.html">
▣ Manage Courses
</a>

<a href="employees.html">
◌ Employees
</a>

<a
href="employee-progress.html"
class="active-sidebar"
>
◔ Employee Progress
</a>

<a href="certificates.html">
✦ Certificates
</a>

<a href="profile.html">
◌ Profile
</a>

<a
href="#"
onclick="openLogoutModal()"
>
↩ Logout
</a>

</div>

</div>


<!-- MAIN -->

<div class="employee-main">

<!-- BANNER -->

<div class="employee-banner">

<h1>
Employee Progress
</h1>

<p>
Track employee training completion and performance.
</p>

</div>



<!-- PROGRESS TABLE -->

<div class="course-filters">

<div class="filter-box">

<select id="departmentFilter">

<option value="">
Departments
</option>

</select>

</div>

<div class="filter-box">

<select id="courseFilter">

<option value="">
Courses
</option>

</select>

</div>

<div class="filter-box">

<select id="statusFilter">

<option value="">
Status
</option>

</select>

</div>

<button id="clearFilters">

Clear

</button>

</div>

<div class="admin-section-card">

<h2>
Training Progress
</h2>



<table class="admin-progress-table">

<thead>

<tr>

<th>
Employee
</th>

<th>
Course
</th>

<th>
Progress
</th>

<th>
Status
</th>

<th>
Action
</th>

</tr>

</thead>
<tbody>

</tbody>
</table>

</div>

</div>

</div>

<!-- LOGOUT MODAL -->

<div
id="logout-modal"
class="logout-modal"
>

<div class="logout-box">

<h3>
Logout
</h3>

<p>
Do you want to logout?
</p>

<div class="logout-actions">

<button
class="logout-cancel"
onclick="closeLogoutModal()"
>
Cancel
</button>

<button
class="logout-confirm"
onclick="logoutUser()"
>
Yes
</button>

</div>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>

<script src="../js/employee.js"></script>
<script src="../js/auth-check.js"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
