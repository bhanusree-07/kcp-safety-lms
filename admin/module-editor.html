<h1>Module Editor</h1>

<p>Create and manage learning modules.</p>

</div>

<div class="admin-section-card">

<div class="admin-input-group">

<label>Module Title</label>

<input
type="text"
id="module-title"
>

</div>

<div class="admin-input-group">

<label>Module Content</label>

<textarea
id="module-content"
rows="6"
></textarea>

</div>

PDF File
<input
type="file"
id="pdf-file"
accept=".pdf"
>


<div class="admin-input-group">

<label>Video Link</label>

<input
type="text"
id="video-link"
placeholder="Youtube URL"
>


<div class="admin-input-group">

<label>PPT Link</label>

<input
type="text"
id="ppt-link"
placeholder="Microsoft PowerPoint Embed URL"
>

</div>

</div>


<div class="admin-input-group">

<label>PPT Link</label>

<input
type="text"
id="ppt-link"
placeholder="PowerPoint URL"
>

</div>



<div class="admin-input-group">

<label>Module Order</label>

<input
type="number"
id="module-order"
>

</div>

<button
class="admin-add-btn"
onclick="saveModule()"
>
Save Module
</button>

</div>

</div>

</div>

<script>

const params=
new URLSearchParams(
window.location.search
);

const courseId=
params.get(
"course_id"
);

const moduleId=
params.get(
"module_id"
);

async function loadModule(){

if(!moduleId){
return;
}

const response=
await fetch(
`https://kcp-safety-lms.onrender.com/module-details?module_id=${moduleId}`
);

const module=
await response.json();

document.getElementById(
"module-title"
).value=
module.module_title;

document.getElementById(
"module-content"
).value=
module.module_content;



document.getElementById(
"video-link"
).value=
module.video_link || "";


document.getElementById(
"ppt-link"
).value=
module.ppt_link || "";


document.getElementById(
"module-order"
).value=
module.module_order;

}
loadModule();

async function saveModule(){

const module_title=
document.getElementById(
"module-title"
).value;

const module_content=
document.getElementById(
"module-content"
).value;

const pdfInput=
document.getElementById(
"pdf-file"
);





const video_link=
document.getElementById(
"video-link"
).value;

const ppt_link=
document.getElementById(
"ppt-link"
).value;

const module_order=
document.getElementById(
"module-order"
).value;

const formData=
new FormData();

if(pdfInput.files[0]){

formData.append(
"pdf_file",
pdfInput.files[0]
);

}



const uploadResponse=
await fetch(
"https://kcp-safety-lms.onrender.com/upload-module-files",
{
method:"POST",
body:formData
}
);

console.log(uploadResponse.status);

const uploadData=
await uploadResponse.json();
console.log(uploadData);

const pdf_file=
uploadData.pdf_file;



let response;

console.log("UPLOAD DATA");
console.log(uploadData);

console.log("FILES");
console.log({
pdf_file,
video_link
});

if(moduleId){

response=
await fetch(
"https://kcp-safety-lms.onrender.com/update-module",
{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
module_id:moduleId,
module_title,
module_content,
module_order,
pdf_file,
video_link,
ppt_link
})
}
);

}else{

response=
await fetch(
"https://kcp-safety-lms.onrender.com/create-module",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
course_id:courseId,
module_title,
module_content,
module_order,
pdf_file,
video_link,
ppt_link
})
}
);

}
const data=
await response.json();

console.log(data);

}

</script>
