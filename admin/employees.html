<!-- NAVIGATION -->

<!-- MAIN -->

<div class="employee-main">

<!-- BANNER -->

<div class="employee-banner">

<h1>
Employees
</h1>

<p>
Manage employee training assignments and records.
</p>

</div>


<div class="admin-toolbar">

<input
type="text"
id="searchInput"
placeholder="Search employees..."
class="course-search"
/>

<button id="clearFilters">
Clear
</button>

</div>

<div class="course-filters">

<div class="filter-box">

<select id="departmentFilter">

<option value="">
Departments
</option>

</select>

</div>

</div>

<!-- EMPLOYEE GRID -->

<div
class="admin-course-grid"
id="employee-grid"
>

</div>

</div>

</div>


<script>

let allEmployees = [];

async function loadEmployees(){

const response=
await fetch(
"http://localhost:3000/employees"
);

const employees=
await response.json();

allEmployees = employees;

populateDepartments();

renderEmployees(
employees
);

}

function filterEmployees(){

const selectedDepartment =
document.getElementById(
"departmentFilter"
).value;

const searchText =
document.getElementById(
"searchInput"
).value
.toLowerCase();

const filteredEmployees =

allEmployees.filter(employee=>{

const departmentMatch =

!selectedDepartment ||

employee.department ===
selectedDepartment;

const searchMatch =

employee.full_name
.toLowerCase()
.includes(searchText)

||

employee.email
.toLowerCase()
.includes(searchText);

return(
departmentMatch &&
searchMatch
);

});

renderEmployees(
filteredEmployees
);

}

function renderEmployees(employees){

const grid =
document.getElementById(
"employee-grid"
);

grid.innerHTML="";

employees.forEach(
(employee)=>{

grid.innerHTML+=`

<div class="admin-course-card">

<h3>
${employee.full_name}
</h3>

<p>
Email: ${employee.email}
</p>

<p>
Department:
${employee.department || "-"}
</p>

<p>
Designation:
${employee.designation || "-"}
</p>

<div class="admin-course-actions">


<a href="employee-details.html?id=${employee.id}">
View Details
</a>

</div>

</div>

`;

}
);

}


function populateDepartments(){

const departmentFilter =
document.getElementById(
"departmentFilter"
);

departmentFilter.innerHTML = `
<option value="">
Departments
</option>
`;

const departments = [

...new Set(

allEmployees
.map(employee => employee.department)
.filter(Boolean)

)

];

departments.forEach(
department=>{

departmentFilter.innerHTML += `
<option value="${department}">
${department}
</option>
`;

}
);

}

function clearFilters(){

document.getElementById(
"searchInput"
).value="";

document.getElementById(
"departmentFilter"
).value="";

renderEmployees(
allEmployees
);

}


document.getElementById(
"searchInput"
).addEventListener(
"input",
filterEmployees
);

document.getElementById(
"departmentFilter"
).addEventListener(
"change",
filterEmployees
);

document.getElementById(
"clearFilters"
).addEventListener(
"click",
clearFilters
);


loadEmployees();

</script>

</button>

<button
class="logout-confirm"

</button>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>

<script src="../js/theme.js"></script>
<script src="../js/auth-check.js"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/logout.js"></script>
</body>
