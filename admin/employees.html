<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employees - KCP LMS</title>

<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/employee.css">
<link rel="stylesheet" href="../css/admin.css">

</head>

<body style="display:none;">

<div class="employee-layout">

<!-- SIDEBAR -->

<div class="employee-sidebar">

<div class="sidebar-logo">

<a href="../index.html">

<img
src="../assests/kcp_logo3.png"
alt="KCP Logo"
class="sidebar-logo-img">

</a>

<h3>

<a
href="../index.html"
class="sidebar-title-link"
>

Safety LMS

</a>

</h3>

</div>


<!-- NAVIGATION -->

<div class="sidebar-menu">

<a href="dashboard.html">
⌂ Dashboard
</a>

<a href="courses.html">
▣ Manage Courses
</a>



<a href="employee-progress.html">
◔ Employee Progress
</a>

<a href="certificates.html">
✦ Certificates
</a>

<a
href="employees.html"
class="active-sidebar"
>
◌ Employees
</a>

<a href="profile.html">
◌ Profile
</a>

<a
href="#"
onclick="openLogoutModal()"
>
↩ Logout
</a>

</div>

</div>


<!-- MAIN -->

<div class="employee-main">

<!-- BANNER -->

<div class="employee-banner">

<h1>
Employees
</h1>

<p>
Manage employee training assignments and records.
</p>

</div>


<!-- TOOLBAR -->

<div class="admin-section-card">

<div class="admin-toolbar">

<input
type="text"
placeholder="Search employee..."
>

<select>

<option>
All Departments
</option>

<option>
Production
</option>

<option>
Maintenance
</option>

<option>
Safety
</option>

<option>
HR
</option>

</select>

<button class="admin-add-btn">

+ Add Employee

</button>

</div>

</div>


<!-- EMPLOYEE GRID -->

<div
class="admin-course-grid"
id="employee-grid"
>

</div>

</div>

</div>


<script>

async function loadEmployees(){

const response=
await fetch(
"http://localhost:3000/employees"
);

const employees=
await response.json();

const grid=
document.getElementById(
"employee-grid"
);

grid.innerHTML="";

employees.forEach(
(employee)=>{

grid.innerHTML+=`

<div class="admin-course-card">

<h3>
${employee.full_name}
</h3>

<p>
Email: ${employee.email}
</p>

<p>
Department:
${employee.department || "-"}
</p>

<p>
Designation:
${employee.designation || "-"}
</p>

<div class="admin-course-actions">

<a href="#">
Assign Course
</a>

<a href="employee-details.html?id=${employee.id}">
View Details
</a>

</div>

</div>

`;

}
);

}

loadEmployees();

</script>


<!-- LOGOUT MODAL -->

<div
id="logout-modal"
class="logout-modal"
>

<div class="logout-box">

<h3>
Logout
</h3>

<p>
Do you want to logout?
</p>

<div class="logout-actions">

<button
class="logout-cancel"
onclick="closeLogoutModal()"
>
Cancel
</button>

<button
class="logout-confirm"
onclick="logoutUser()"
>
Yes
</button>

</div>

</div>

</div>

<script>

function openLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>

<script src="../js/auth-check.js"></script>
<script src="../js/admin-auth.js"></script>
<script src="../js/logout.js"></script>
</body>
</html>
