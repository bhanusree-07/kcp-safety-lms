>

</p>

class="logout-cancel"
onclick="closeLogoutModal()"
>

</button>

class="logout-confirm"

>

</button>

document.getElementById(
"logout-modal"
).style.display=
"flex";

}

function closeLogoutModal(){

document.getElementById(
"logout-modal"
).style.display=
"none";

}

function logoutUser(){

localStorage.clear();

window.location.href=
"../index.html";

}

</script>
