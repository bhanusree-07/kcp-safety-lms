<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KCP Safety LMS - Forgot Password</title>

    <link rel="stylesheet" href="css/global.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <!-- Logo -->

            <div class="logo-header">

                <img
                    src="assests/kcp_logo3.png"
                    alt="KCP Logo"
                    class="logo-img"
                >

                <h2>Safety LMS</h2>

            </div>

            <!-- Heading -->

            <h1>Forgot Password</h1>

            <p class="small-text">
                Enter your email below to receive a password reset link
            </p>

            <!-- Form -->

            <form id="forgot-form">

                <input
                    type="email"
                    id="forgot-email"
                    placeholder="Email"
                    required
                >

                <button type="submit">
                    Send Reset Link
                </button>

                <p id="forgot-message" class="form-message"></p>

            </form>

            <!-- Back -->

            <a
                href="login.html"
                class="forgot-link"
            >
                Back to Log In
            </a>

        </div>

    </div>

<script
    type="module"
    src="js/auth.js">
</script>

<script src="js/theme.js"></script>

</body>
</html>
